services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tbase
    ports:
      - "5432:5432"
    volumes:
      - tbase_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - tbase_redis:/data

volumes:
  tbase_pg:
  tbase_redis:
